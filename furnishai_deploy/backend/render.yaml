services:
  - type: web
    name: furnishai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENV
        value: us-east-1
      - key: PINECONE_INDEX_NAME
        value: ikarus-furniture
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: DATA_PATH
        value: data/intern_data_ikarus.csv
      - key: IMAGE_MODEL_PATH
        value: models/image_classifier.pth
